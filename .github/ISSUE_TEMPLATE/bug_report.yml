name: "\U0001F41B Bug Report"
description: Something isn't working correctly
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this bug! Please fill out the information below so we can investigate.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Tell us what went wrong...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
      placeholder: I expected...
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How much does this affect your experience?
      options:
        - Minor — cosmetic or low-impact issue
        - Moderate — feature works but with issues
        - Major — feature is significantly broken
        - Critical — cannot use the platform
    validations:
      required: true

  - type: input
    id: page-url
    attributes:
      label: Page URL
      description: The URL where you encountered the bug (auto-filled if using the feedback button).
      placeholder: https://secid.mx/...

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem.
      placeholder: Drag and drop images here...

  - type: input
    id: browser
    attributes:
      label: Browser & OS
      description: What browser and operating system are you using? (auto-filled if using the feedback button)
      placeholder: e.g. Chrome 120 on macOS 14

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other information that might help us investigate.
